# Order of modules on prompt
format = """$hostname $directory\
$fill\
$hg_branch\
$git_branch\
$git_commit\
$git_status\
$git_state\
$nix_shell\
$terraform\
$line_break\
$character"""
right_format = """$status$cmd_duration"""

[fill]
symbol = ' '

[directory]
style = ""
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 3

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[>](fg:#6A8AEA)"
error_symbol = "[>](fg:#d56767)"
format = "$symbol "

[status]
disabled = false

[hostname]
ssh_only = false
style = "bold dimmed blue"
format = "[$hostname]($style)"

[cmd_duration]
format = '[$duration]($style)'


[git_branch]
disabled = false
symbol = " "
style = "fg:#b79999"
truncation_length = 5
format = '[$symbol$branch(:$remote_branch)]($style) ' # this sets path ../../../../

[git_commit]
disabled = false
commit_hash_length = 1

[git_state]
disabled = false
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = " picking"
bisect = "bisecting"
am = "am'ing"
am_or_rebase = "am/rebase"

[git_status]
disabled = false
style= "fg:#5F8575"
stashed = " ${count}"
ahead = "󰞙 ${count}"
behind = "󰞒 ${count}"
diverged = "󰵉 ${ahead_count} ${behind_count}"
conflicted = " ${count}"
deleted = " ${count}"
renamed = " ${count}"
modified = " ${count}"
staged = " ${count}"
untracked = "󱅘 ${count}"
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~     ...........       ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ #
